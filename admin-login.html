<!DOCTYPE html>
<html lang="en">
<head>
  <script src="icons.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Queue Management System</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon-32x32.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 2rem;
      color: white;
    }

    .login-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    .login-subtitle {
      color: #6b7280;
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .form-control {
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-select {
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 1rem;
      background-color: white;
    }

    .form-select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .btn-login {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      width: 100%;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
      color: white;
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      color: #3b82f6;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-top: 15px;
      font-size: 0.9rem;
      display: none;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
    
    /* Developer Credit Footer */
    .developer-credit {
      position: fixed;
      bottom: 10px;
      right: 15px;
      font-size: 0.95rem;
      color: #6b7280;
      opacity: 0.6;
      z-index: 1001;
      pointer-events: none;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }
    
    @media (max-width: 768px) {
      .developer-credit {
        font-size: 0.85rem;
        bottom: 8px;
        right: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo"><i class="fas fa-building" style="font-size: 3rem;"></i></div>
      <h1 class="login-title">Admin Login</h1>
      <p class="login-subtitle">Administrator Access</p>
    </div>

    <form id="loginForm">
      <div class="form-group" id="institutionGroup">
        <label for="institution" class="form-label">Institution</label>
        <select class="form-select" id="institution" required>
          <option value="">Loading institutions...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Enter your username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-login" id="loginBtn">
        Login to Dashboard
      </button>

      <div id="errorMessage" class="error-message"></div>
    </form>

    <div class="back-link">
      <a href="index.html">← Back to Queue System</a>
    </div>
  </div>

  <script>
    // Load institutions on page load
    async function loadInstitutions() {
      const select = document.getElementById('institution');
      try {
        const response = await fetch(`${API_BASE_URL}/institutions`);
        if (response.ok) {
          const institutions = await response.json();
          select.innerHTML = '<option value="">Select Institution</option>';
          select.innerHTML += '<option value="super-admin">Super Admin (System-wide)</option>';
          institutions.forEach(inst => {
            select.innerHTML += `<option value="${inst.id}">${inst.name}</option>`;
          });
        } else {
          select.innerHTML = '<option value="">Failed to load institutions</option>';
        }
      } catch (error) {
        console.error('Error loading institutions:', error);
        select.innerHTML = '<option value="">Connection error</option>';
      }
    }

    // Toggle institution selector visibility based on super-admin selection
    document.addEventListener('DOMContentLoaded', function() {
      loadInstitutions();

      const institutionSelect = document.getElementById('institution');
      const usernameInput = document.getElementById('username');

      institutionSelect.addEventListener('change', function() {
        if (this.value === 'super-admin') {
          usernameInput.value = 'super-admin';
          usernameInput.readOnly = true;
        } else {
          if (usernameInput.value === 'super-admin') usernameInput.value = '';
          usernameInput.readOnly = false;
        }
      });
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const institutionValue = document.getElementById('institution').value;
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');

      errorMessage.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      const isSuperAdmin = institutionValue === 'super-admin';
      const institution_id = isSuperAdmin ? null : institutionValue;

      try {
        const body = { username, password };
        if (institution_id) body.institution_id = institution_id;

        const response = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const result = await response.json();

        if (result.success && result.user) {
          localStorage.setItem('adminSession', JSON.stringify({
            department: result.user.department || result.user.username,
            username: result.user.username,
            name: result.user.name,
            icon: result.user.icon,
            role: result.user.role,
            institution_id: result.user.institution_id,
            service_id: result.user.service_id,
            institution_name: result.user.institution_name || '',
            loginTime: new Date().toISOString()
          }));

          if (result.user.role === 'super-admin') {
            window.location.href = 'super-admin-dashboard.html';
          } else {
            window.location.href = 'admin-dashboard.html';
          }
        } else {
          errorMessage.textContent = result.error || 'Invalid credentials. Please try again.';
          errorMessage.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login to Dashboard';
        }
      } catch (error) {
        console.error('Login error:', error);
        errorMessage.textContent = 'Connection error. Please check your internet connection.';
        errorMessage.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login to Dashboard';
      }
    });

    // Check if already logged in
    (function() {
      const adminSession = localStorage.getItem('adminSession');
      if (adminSession) {
        const session = JSON.parse(adminSession);
        const loginTime = new Date(session.loginTime);
        const now = new Date();
        const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
        
        if (hoursDiff < 24) {
          if (session.role === 'super-admin' || session.department === 'super-admin') {
            window.location.href = 'super-admin-dashboard.html';
          } else {
            window.location.href = 'admin-dashboard.html';
          }
        } else {
          localStorage.removeItem('adminSession');
        }
      }
    })();
  </script>
  
  <!-- Developer Credit -->
  <div class="developer-credit">
    Developed By: Engr. Carlo Cimacio
  </div>
</body>
</html>
