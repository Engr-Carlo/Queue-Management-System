<!DOCTYPE html>
<html lang="en">
<head>
  <script src="icons.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Queue Management System</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon-32x32.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      color:#F8FAFC;
    }
    .page-bg{
      position:fixed;inset:0;z-index:-1;
      background:
        linear-gradient(160deg,rgba(15,23,42,.92),rgba(13,148,136,.75)),
        url('https://images.unsplash.com/photo-1557683316-973673baf926?w=1920&q=80') center/cover no-repeat;
    }

    .login-container{
      background:rgba(255,255,255,.06);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.10);
      border-radius:20px;padding:38px 32px;
      width:100%;max-width:420px;margin:20px;
      box-shadow:0 20px 50px rgba(0,0,0,.25);
    }
    .login-header{text-align:center;margin-bottom:28px}
    .login-logo{
      width:72px;height:72px;
      background:linear-gradient(135deg,#0D9488,#0F766E);
      border-radius:18px;display:flex;align-items:center;justify-content:center;
      margin:0 auto 18px;font-size:2rem;color:#fff;
      box-shadow:0 8px 24px rgba(13,148,136,.3);
    }
    .login-title{font-size:1.6rem;font-weight:800;color:#F8FAFC;margin-bottom:6px}
    .login-subtitle{color:rgba(248,250,252,.5);font-size:.95rem}

    .form-group{margin-bottom:18px}
    .form-label{font-weight:600;color:rgba(248,250,252,.7);margin-bottom:7px;font-size:.9rem}
    .form-control,.form-select{
      background:rgba(255,255,255,.06);
      border:2px solid rgba(255,255,255,.10);
      border-radius:12px;padding:12px 16px;font-size:.95rem;
      color:#F8FAFC;transition:all .3s;
    }
    .form-control::placeholder{color:rgba(248,250,252,.3)}
    .form-control:focus,.form-select:focus{
      background:rgba(255,255,255,.09);
      border-color:rgba(13,148,136,.5);
      box-shadow:0 0 0 3px rgba(13,148,136,.15);
      color:#F8FAFC;
    }
    .form-select{background-color:rgba(255,255,255,.06);color:#F8FAFC}
    .form-select option{background:#0F172A;color:#F8FAFC}

    .btn-login{
      background:linear-gradient(135deg,#0D9488,#0F766E);
      color:#fff;border:none;border-radius:12px;
      padding:14px;font-size:1.05rem;font-weight:600;
      width:100%;transition:all .3s;margin-top:4px;
    }
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(13,148,136,.35);color:#fff}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .error-message{
      background:rgba(239,68,68,.12);color:#f87171;
      border:1px solid rgba(239,68,68,.25);border-radius:10px;
      padding:12px;margin-top:14px;font-size:.88rem;display:none;
    }

    .back-link{text-align:center;margin-top:18px}
    .back-link a{color:#2DD4BF;text-decoration:none;font-weight:500;font-size:.9rem;transition:opacity .2s}
    .back-link a:hover{opacity:.75;text-decoration:underline}

    .developer-credit{
      position:fixed;bottom:10px;right:15px;
      font-size:.82rem;color:rgba(248,250,252,.25);opacity:.6;
      z-index:1001;pointer-events:none;
    }
    @media(max-width:768px){.developer-credit{font-size:.78rem;bottom:8px;right:12px}}
  </style>
</head>
<body>
  <div class="page-bg"></div>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo"><i class="fas fa-building" style="font-size:2.2rem"></i></div>
      <h1 class="login-title">Admin Login</h1>
      <p class="login-subtitle">Administrator Access</p>
    </div>

    <form id="loginForm">
      <div class="form-group" id="institutionGroup">
        <label for="institution" class="form-label">Institution</label>
        <select class="form-select" id="institution" required>
          <option value="">Loading institutions...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Enter your username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-login" id="loginBtn">
        Login to Dashboard
      </button>

      <div id="errorMessage" class="error-message"></div>
    </form>

    <div class="back-link">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Queue System</a>
    </div>
  </div>

  <script>
    async function loadInstitutions() {
      const select = document.getElementById('institution');
      try {
        const response = await fetch(`${API_BASE_URL}/institutions`);
        if (response.ok) {
          const institutions = await response.json();
          select.innerHTML = '<option value="">Select Institution</option>';
          select.innerHTML += '<option value="super-admin">Super Admin (System-wide)</option>';
          institutions.forEach(inst => {
            select.innerHTML += `<option value="${inst.id}">${inst.name}</option>`;
          });
        } else {
          select.innerHTML = '<option value="">Failed to load institutions</option>';
        }
      } catch (error) {
        console.error('Error loading institutions:', error);
        select.innerHTML = '<option value="">Connection error</option>';
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadInstitutions();
      const institutionSelect = document.getElementById('institution');
      const usernameInput = document.getElementById('username');
      institutionSelect.addEventListener('change', function() {
        if (this.value === 'super-admin') {
          usernameInput.value = 'super-admin';
          usernameInput.readOnly = true;
        } else {
          if (usernameInput.value === 'super-admin') usernameInput.value = '';
          usernameInput.readOnly = false;
        }
      });
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const institutionValue = document.getElementById('institution').value;
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');

      errorMessage.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      const isSuperAdmin = institutionValue === 'super-admin';
      const institution_id = isSuperAdmin ? null : institutionValue;

      try {
        const body = { username, password };
        if (institution_id) body.institution_id = institution_id;

        const response = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const result = await response.json();

        if (result.success && result.user) {
          localStorage.setItem('adminSession', JSON.stringify({
            department: result.user.department || result.user.username,
            username: result.user.username,
            name: result.user.name,
            icon: result.user.icon,
            role: result.user.role,
            institution_id: result.user.institution_id,
            service_id: result.user.service_id,
            institution_name: result.user.institution_name || '',
            loginTime: new Date().toISOString()
          }));

          if (result.user.role === 'super-admin') {
            window.location.href = 'super-admin-dashboard.html';
          } else {
            window.location.href = 'admin-dashboard.html';
          }
        } else {
          errorMessage.textContent = result.error || 'Invalid credentials. Please try again.';
          errorMessage.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login to Dashboard';
        }
      } catch (error) {
        console.error('Login error:', error);
        errorMessage.textContent = 'Connection error. Please check your internet connection.';
        errorMessage.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login to Dashboard';
      }
    });

    (function() {
      const adminSession = localStorage.getItem('adminSession');
      if (adminSession) {
        const session = JSON.parse(adminSession);
        const loginTime = new Date(session.loginTime);
        const now = new Date();
        const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
        if (hoursDiff < 24) {
          if (session.role === 'super-admin' || session.department === 'super-admin') {
            window.location.href = 'super-admin-dashboard.html';
          } else {
            window.location.href = 'admin-dashboard.html';
          }
        } else {
          localStorage.removeItem('adminSession');
        }
      }
    })();
  </script>

  <div class="developer-credit">Developed By: Engr. Carlo Cimacio</div>
</body>
</html>
