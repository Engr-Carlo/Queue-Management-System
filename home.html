<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Management System - Select Service</title>
  <script src="config.js"></script>
  <link rel="icon" type="image/svg+xml" href="images/favicon-32x32.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    * { user-select: none; -webkit-user-select: none; box-sizing: border-box; }
    body {
      margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
      background: #F8FAFC;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #1E293B;
    }
    .page-bg { display: none; }
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      background: linear-gradient(135deg, #0F766E, #0D9488);
      border-bottom: none;
      padding: 12px 24px;
      box-shadow: 0 2px 8px rgba(13,148,136,0.25);
    }
    .top-bar-inner {
      display: flex; justify-content: space-between; align-items: center;
      max-width: 1200px; margin: 0 auto;
    }
    .top-bar-title {
      color: #fff; font-size: 1rem; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .top-bar-title .dot { width: 8px; height: 8px; border-radius: 50%; background: #2DD4BF; }
    .step-pill {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 5px 14px; border-radius: 999px;
      font-size: 0.8rem; font-weight: 600;
    }
    .main-container {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 90px 20px 40px;
    }
    .content-area { text-align: center; max-width: 960px; width: 100%; }

    .institution-banner {
      background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 16px;
      padding: 20px 28px; margin-bottom: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex; align-items: center; gap: 16px; text-align: left;
    }
    .institution-banner-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, #0D9488, #0F766E);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.4rem; flex-shrink: 0;
    }
    .institution-banner-text h2 {
      color: #1E293B; font-size: 1.2rem; font-weight: 700; margin: 0 0 2px;
    }
    .institution-banner-text p {
      color: #64748B; font-size: 0.85rem; margin: 0;
    }

    .page-title {
      font-size: clamp(1.8rem, 4.5vw, 2.8rem); font-weight: 800; color: #1E293B;
      margin-bottom: 8px; letter-spacing: -0.02em;
    }
    .page-subtitle {
      font-size: clamp(0.95rem, 2vw, 1.1rem); color: #64748B;
      margin-bottom: 36px;
    }

    .selection-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px; margin-bottom: 40px; max-width: 860px; width: 100%;
      margin-left: auto; margin-right: auto;
    }
    .person-card {
      background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 16px;
      padding: 32px 20px; text-align: center; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .person-card:hover {
      border-color: #0D9488; transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(13,148,136,0.12);
    }
    .person-card.selected {
      border-color: #0D9488; background: #F0FDFA;
      box-shadow: 0 0 0 3px rgba(13,148,136,0.2), 0 8px 24px rgba(13,148,136,0.12);
    }
    .person-icon {
      width: 64px; height: 64px;
      background: #F0FDFA;
      border: 1px solid #99F6E4; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px; transition: all 0.3s ease;
    }
    .person-card:hover .person-icon, .person-card.selected .person-icon {
      background: linear-gradient(135deg, #0D9488, #0F766E);
      color: #fff; border-color: transparent;
      box-shadow: 0 6px 20px rgba(13,148,136,0.4);
    }
    .person-icon i { font-size: 1.6rem; color: #0D9488; }
    .person-card:hover .person-icon i, .person-card.selected .person-icon i { color: #fff; }
    .person-title { font-size: 1.05rem; font-weight: 700; color: #1E293B; margin-bottom: 4px; }
    .person-department { font-size: 0.85rem; color: #64748B; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: #64748B; font-size: 0.9rem; font-weight: 500;
      text-decoration: none; cursor: pointer; border: none; background: none;
      transition: color 0.2s; padding: 0; margin-top: 8px;
    }
    .back-btn:hover { color: #0D9488; }

    /* Confirmation Modal */
    .confirmation-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
    }
    .confirmation-modal.show { display: flex; opacity: 1; }
    .modal-content {
      background: #FFFFFF; border: 1px solid #E2E8F0;
      border-radius: 20px; padding: 40px 32px; text-align: center;
      max-width: 420px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      transform: scale(0.9); transition: transform 0.3s ease;
    }
    .confirmation-modal.show .modal-content { transform: scale(1); }
    .modal-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #0D9488, #0F766E);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; color: #fff; font-size: 1.4rem;
    }
    .modal-title { font-size: 1.3rem; font-weight: 700; color: #1E293B; margin-bottom: 6px; }
    .modal-subtitle { font-size: 1rem; color: #64748B; margin-bottom: 24px; }
    .modal-buttons { display: flex; gap: 12px; justify-content: center; }
    .modal-btn {
      padding: 12px 28px; font-size: 0.95rem; font-weight: 600;
      border-radius: 12px; cursor: pointer; border: none; transition: all 0.2s;
    }
    .modal-btn-primary {
      background: linear-gradient(135deg, #0D9488, #0F766E); color: #fff;
    }
    .modal-btn-primary:hover {
      transform: translateY(-2px); box-shadow: 0 8px 24px rgba(13,148,136,0.4);
    }
    .modal-btn-secondary {
      background: #F1F5F9; border: 1px solid #E2E8F0; color: #64748B;
    }
    .modal-btn-secondary:hover { background: #E2E8F0; }

    .developer-credit {
      position: fixed; bottom: 10px; right: 15px; font-size: 0.8rem;
      color: #CBD5E1; z-index: 1001; pointer-events: none;
    }
    @media (max-width: 768px) {
      .main-container { padding: 80px 16px 32px; }
      .selection-grid { grid-template-columns: 1fr; gap: 12px; }
      .person-card { padding: 24px 16px; }
      .institution-banner { flex-direction: column; text-align: center; padding: 16px; }
      .modal-buttons { flex-direction: column; }
      .modal-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>

  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="top-bar-title">
        <span class="dot"></span>
        <span id="headerInstitutionName">Queue Management</span>
      </div>
      <div class="step-pill">Step 1 of 2</div>
    </div>
  </div>

  <div class="main-container">
    <div class="content-area">
      <div class="institution-banner" id="institutionBanner" style="display:none;">
        <div class="institution-banner-icon"><i class="fas fa-building"></i></div>
        <div class="institution-banner-text">
          <h2 id="bannerInstName">Loading...</h2>
          <p>You are queuing at this institution</p>
        </div>
      </div>
      <h1 class="page-title">Select a Service</h1>
      <p class="page-subtitle">Choose who you would like to see</p>
      <div id="serviceGrid" class="selection-grid">
        <div style="grid-column:1/-1;text-align:center;padding:40px;color:#64748B;">
          <i class="fas fa-spinner fa-spin" style="font-size:1.5rem;"></i>
          <p style="margin-top:12px;">Loading services...</p>
        </div>
      </div>
      <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back to institutions</button>
    </div>
  </div>

  <div id="confirmationModal" class="confirmation-modal">
    <div class="modal-content">
      <div class="modal-icon"><i class="fas fa-check"></i></div>
      <div class="modal-title">Confirm Selection</div>
      <div class="modal-subtitle" id="modalPersonName"></div>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-primary" onclick="confirmSelection()">
          <i class="fas fa-check"></i> Continue
        </button>
        <button class="modal-btn modal-btn-secondary" onclick="cancelSelection()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="developer-credit">Developed By: Engr. Carlo Cimacio</div>

  <script>
    let selectedPerson = null, selectedPersonName = null;
    let selectedServiceId = null, selectedServicePrefix = null;
    let institutionId = null;

    const urlParams = new URLSearchParams(window.location.search);
    institutionId = urlParams.get('inst');
    if (!institutionId) window.location.href = 'index.html';

    const DEFAULT_ICONS = {
      dean: 'fa-user-tie', chair: 'fa-chalkboard-teacher',
      registrar: 'fa-clipboard-list', cashier: 'fa-cash-register',
      reception: 'fa-concierge-bell', doctor: 'fa-user-doctor',
      lab: 'fa-flask', pharmacy: 'fa-pills', default: 'fa-concierge-bell'
    };

    function getServiceIcon(service) {
      if (service.icon) return service.icon;
      const name = service.name.toLowerCase();
      for (const [key, icon] of Object.entries(DEFAULT_ICONS)) {
        if (name.includes(key)) return icon;
      }
      return DEFAULT_ICONS.default;
    }

    async function loadServices() {
      const grid = document.getElementById('serviceGrid');
      try {
        const [instRes, servicesRes] = await Promise.all([
          fetch(API_BASE_URL + '/institutions/' + institutionId),
          fetch(API_BASE_URL + '/institutions/' + institutionId + '/services')
        ]);
        if (!instRes.ok || !servicesRes.ok) throw new Error('Failed to fetch');
        const institution = await instRes.json();
        const services = await servicesRes.json();

        document.getElementById('headerInstitutionName').textContent = institution.name;
        document.getElementById('bannerInstName').textContent = institution.name;
        document.getElementById('institutionBanner').style.display = 'flex';
        document.title = 'Select Service - ' + institution.name;
        localStorage.setItem('institution_id', institutionId);
        localStorage.setItem('institution_name', institution.name);

        if (services.length === 0) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#64748B;"><p>No services available.</p></div>';
          return;
        }
        grid.innerHTML = services.map(function(service) {
          var icon = getServiceIcon(service);
          var escapedName = service.name.replace(/'/g, "\\'");
          var descHtml = service.description ? '<div class="person-department">' + service.description + '</div>' : '';
          return '<div class="person-card" onclick="selectService(event, ' + service.id + ', \'' + service.prefix + '\', \'' + escapedName + '\')">'
            + '<div class="person-icon"><i class="fas ' + icon + '"></i></div>'
            + '<div class="person-title">' + service.name + '</div>'
            + descHtml + '</div>';
        }).join('');
      } catch (error) {
        console.error('Error loading services:', error);
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#64748B;">Failed to load. <a href="#" onclick="loadServices()" style="color:#2DD4BF;">Retry</a></div>';
      }
    }

    function selectService(event, serviceId, prefix, serviceName) {
      document.querySelectorAll('.person-card').forEach(function(c) { c.classList.remove('selected'); });
      event.currentTarget.classList.add('selected');
      selectedPerson = prefix.toLowerCase();
      selectedPersonName = serviceName;
      selectedServiceId = serviceId;
      selectedServicePrefix = prefix;
      document.getElementById('modalPersonName').textContent = serviceName;
      document.getElementById('confirmationModal').classList.add('show');
      if ('vibrate' in navigator) navigator.vibrate(50);
    }

    function confirmSelection() {
      if (selectedPerson) {
        localStorage.setItem('selectedPerson', selectedPerson);
        localStorage.setItem('selectedPersonName', selectedPersonName);
        localStorage.setItem('selectedServiceId', selectedServiceId);
        localStorage.setItem('selectedServicePrefix', selectedServicePrefix);
        localStorage.setItem('selectionTime', new Date().toISOString());
        window.location.href = 'queue-number.html?inst=' + institutionId;
      }
    }

    function cancelSelection() {
      document.getElementById('confirmationModal').classList.remove('show');
      document.querySelectorAll('.person-card').forEach(function(c) { c.classList.remove('selected'); });
      selectedPerson = null; selectedPersonName = null;
      selectedServiceId = null; selectedServicePrefix = null;
    }

    function goBack() { window.location.href = 'index.html'; }

    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('keydown', function(e) {
      var modal = document.getElementById('confirmationModal');
      if (modal.classList.contains('show')) {
        if (e.key === 'Enter') confirmSelection();
        else if (e.key === 'Escape') cancelSelection();
      } else if (e.key === 'Escape') goBack();
    });
    document.getElementById('confirmationModal').addEventListener('click', function(e) {
      if (e.target === this) cancelSelection();
    });
    loadServices();
  </script>
</body>
</html>
