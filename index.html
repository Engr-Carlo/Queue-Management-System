<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Queue Management System</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon-32x32.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="config.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0; padding: 0; min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #0F172A; overflow-x: hidden;
    }
    .page-bg {
      position: fixed; inset: 0;
      background: url('https://images.unsplash.com/photo-1557683316-973673baf926?w=1920&q=80') center/cover no-repeat;
      z-index: 0;
    }
    .page-bg::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(15,23,42,0.88) 0%, rgba(13,148,136,0.72) 100%);
    }
    .hero-container {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px 40px;
    }
    .hero-content { text-align: center; max-width: 1100px; width: 100%; }
    .brand-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 8px 20px; border-radius: 999px;
      color: #2DD4BF; font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.5px; margin-bottom: 24px;
    }
    .hero-title {
      font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; color: #fff;
      margin-bottom: 12px; letter-spacing: -0.03em; line-height: 1.1;
    }
    .hero-title span { color: #2DD4BF; }
    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.15rem); font-weight: 400;
      color: rgba(255,255,255,0.65); margin-bottom: 48px; line-height: 1.5;
    }
    .institution-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px; width: 100%; margin-bottom: 40px;
    }
    .institution-card {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
      padding: 32px 24px; text-align: center; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .institution-card:hover {
      background: rgba(255,255,255,0.12); border-color: #2DD4BF;
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(45,212,191,0.3);
    }
    .institution-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, rgba(13,148,136,0.25), rgba(45,212,191,0.1));
      border: 1px solid rgba(45,212,191,0.25); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; font-size: 1.8rem; color: #2DD4BF;
      transition: all 0.3s ease;
    }
    .institution-card:hover .institution-icon {
      background: linear-gradient(135deg, #0D9488, #0F766E);
      color: #fff; transform: scale(1.08);
      box-shadow: 0 8px 24px rgba(13,148,136,0.4);
    }
    .institution-name { font-size: 1.15rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .institution-type { font-size: 0.85rem; color: rgba(255,255,255,0.5); font-weight: 500; text-transform: capitalize; }
    .institution-desc { font-size: 0.82rem; color: rgba(255,255,255,0.4); margin-top: 8px; line-height: 1.4; }
    .loading-text, .no-institutions { font-size: 1.05rem; color: rgba(255,255,255,0.55); padding: 60px 0; }
    .footer-links {
      display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 16px;
    }
    .footer-links a {
      color: rgba(255,255,255,0.4); text-decoration: none;
      font-size: 0.85rem; font-weight: 500; transition: color 0.2s;
    }
    .footer-links a:hover { color: #2DD4BF; }
    .developer-credit {
      position: fixed; bottom: 10px; right: 15px; font-size: 0.8rem;
      color: rgba(255,255,255,0.25); z-index: 1001; pointer-events: none;
    }
    @media (max-width: 768px) {
      .hero-container { padding: 40px 16px 24px; }
      .institution-grid { grid-template-columns: 1fr; gap: 14px; }
      .institution-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>
  <div class="hero-container">
    <div class="hero-content">
      <div class="brand-badge"><i class="fas fa-bolt"></i> Smart Queue System</div>
      <h1 class="hero-title">Queue Management <span>Made Simple</span></h1>
      <p class="hero-subtitle">Select your institution to get started with fast, organized queuing</p>
      <div id="institutionGrid" class="institution-grid">
        <div class="loading-text"><i class="fas fa-spinner fa-spin"></i> Loading institutions...</div>
      </div>
      <div class="footer-links">
        <a href="admin-login.html"><i class="fas fa-lock"></i> Admin Login</a>
      </div>
    </div>
  </div>
  <div class="developer-credit">Developed By: Engr. Carlo Cimacio</div>
  <script>
    const INSTITUTION_ICONS = {
      university: 'fa-graduation-cap', hospital: 'fa-hospital',
      restaurant: 'fa-utensils', government: 'fa-landmark',
      bank: 'fa-building-columns', clinic: 'fa-stethoscope',
      billing: 'fa-file-invoice-dollar', other: 'fa-building'
    };
    async function loadInstitutions() {
      const grid = document.getElementById('institutionGrid');
      try {
        const response = await fetch(API_BASE_URL + '/institutions');
        if (!response.ok) throw new Error('Failed to fetch');
        const institutions = await response.json();
        if (institutions.length === 0) {
          grid.innerHTML = '<div class="no-institutions"><i class="fas fa-building"></i><br>No institutions available yet.</div>';
          return;
        }
        grid.innerHTML = institutions.map(inst => {
          const icon = INSTITUTION_ICONS[inst.type] || INSTITUTION_ICONS.other;
          const logoHtml = inst.logo_url
            ? '<img src="' + inst.logo_url + '" style="width:44px;height:44px;border-radius:10px;object-fit:cover;" alt="">'
            : '<i class="fas ' + icon + '"></i>';
          const descHtml = inst.description ? '<div class="institution-desc">' + inst.description + '</div>' : '';
          return '<div class="institution-card" onclick="selectInstitution(' + inst.id + ')">'
            + '<div class="institution-icon">' + logoHtml + '</div>'
            + '<div class="institution-name">' + inst.name + '</div>'
            + '<div class="institution-type">' + inst.type + '</div>'
            + descHtml + '</div>';
        }).join('');
      } catch (error) {
        console.error('Error loading institutions:', error);
        grid.innerHTML = '<div class="loading-text">Failed to load. <a href="#" onclick="loadInstitutions()" style="color:#2DD4BF;">Retry</a></div>';
      }
    }
    function selectInstitution(id) { window.location.href = 'home.html?inst=' + id; }
    loadInstitutions();
  </script>
</body>
</html>
